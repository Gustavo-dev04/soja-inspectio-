# Render Blueprint — backend de visão (YOLO11s-cls + OpenCV).
# O frontend Next.js vai pra Vercel; este serviço cuida só do /inspect.
# No painel do Render: New > Blueprint > aponte pra este repo.
services:
  - type: web
    name: soja-inspection-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter # 'free' hiberna; YOLO+torch costuma exigir 'starter' (512MB+)
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HF_MODEL_REPO
        value: Guguinhaxd/soja-inspection
      - key: HF_MODEL_REPO_TYPE
        value: space
      - key: HF_MODEL_FILE
        value: soja_yolo11s_finetuned.pt
      - key: HF_TOKEN
        sync: false # só necessário se o Space for privado
      - key: CORS_ORIGIN
        sync: false # ex.: https://soja-inspection.vercel.app
